# ── After-Close & Evening Scans ───────────────────────────────────────────────
# 45% of daily Form 4 volume files between 4-6:30 PM ET
# Single UTC schedule — shifts 1hr in winter but coverage maintained
#
# EDT (summer) → EST (winter):
#   20:15 UTC = 4:15 PM EDT → 3:15 PM EST (market hours, market scan covers it)
#   20:30 UTC = 4:30 PM EDT → 3:30 PM EST (market hours, market scan covers it)
#   21:00 UTC = 5:00 PM EDT → 4:00 PM EST (right at close ✅)
#   22:00 UTC = 6:00 PM EDT → 5:00 PM EST ✅
#   00:00 UTC = 8:00 PM EDT → 7:00 PM EST ✅  (pre-bed check)
#   02:00 UTC = 10:00 PM EDT → 9:00 PM EST ✅ (bedtime scan)
#
# Silent window: 02:00-12:30 UTC (10PM-8:30AM EDT) — almost zero filing activity
name: After-Close and Evening

on:
  schedule:
    - cron: '15 20 * * 1-5'   # 4:15 PM EDT / 3:15 PM EST
    - cron: '30 20 * * 1-5'   # 4:30 PM EDT / 3:30 PM EST
    - cron: '0  21 * * 1-5'   # 5:00 PM EDT / 4:00 PM EST
    - cron: '0  22 * * 1-5'   # 6:00 PM EDT / 5:00 PM EST
    - cron: '0  0  * * 2-6'   # 8:00 PM EDT / 7:00 PM EST  (next UTC day)
    - cron: '0  2  * * 2-6'   # 10:00 PM EDT / 9:00 PM EST (next UTC day)
  workflow_dispatch:

jobs:
  evening-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
          restore-keys: insideredge-state-
      - name: Run evening scan
        env:
          SEC_API_KEY:   ${{ secrets.SEC_API_KEY }}
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
        run: python bot_v17.py --mode scan
      - name: Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
