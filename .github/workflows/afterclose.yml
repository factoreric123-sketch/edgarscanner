# ── After-Close & Evening Scans ───────────────────────────────────────────────
name: After-Close and Evening

on:
  schedule:
    - cron: '15 20 * * 1-5'   # 4:15 PM EDT / 3:15 PM EST
    - cron: '30 20 * * 1-5'   # 4:30 PM EDT / 3:30 PM EST
    - cron: '0  21 * * 1-5'   # 5:00 PM EDT / 4:00 PM EST
    - cron: '0  22 * * 1-5'   # 6:00 PM EDT / 5:00 PM EST
    - cron: '0  0  * * 2-6'   # 8:00 PM EDT / 7:00 PM EST
    - cron: '0  2  * * 2-6'   # 10:00 PM EDT / 9:00 PM EST
  workflow_dispatch:

jobs:
  evening-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Validate secrets
        id: secrets
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=()
          for name in POLYGON_KEY DISCORD_URL SEC_USER_AGENT; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping evening scan; missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.secrets.outputs.ready == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'
      - if: steps.secrets.outputs.ready == 'true'
        run: pip install requests
      - name: Restore state
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/cache/restore@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
          restore-keys: |
            insideredge-state-
      - name: Run evening scan
        if: steps.secrets.outputs.ready == 'true'
        env:
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EODHD_KEY: ${{ secrets.EODHD_KEY }}
        run: python bot_v17.py --mode scan
      - name: Save state
        if: always() && steps.secrets.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
