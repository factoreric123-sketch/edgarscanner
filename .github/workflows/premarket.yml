# ── Pre-Market Scans ──────────────────────────────────────────────────────────
name: Pre-Market

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 8:30 AM EDT
    - cron: '15 13 * * 1-5'   # 9:15 AM EDT
  workflow_dispatch:


# All stateful workflows share one concurrency group: they mutate the same
# cached state file, so runs must never overlap (a 14-min busy scan would
# otherwise collide with the next 5-min cron tick).
concurrency:
  group: insideredge-state
  cancel-in-progress: false
jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Validate secrets
        id: secrets
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=()
          for name in POLYGON_KEY DISCORD_URL SEC_USER_AGENT; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping pre-market scan; missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.secrets.outputs.ready == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'
      - if: steps.secrets.outputs.ready == 'true'
        run: pip install requests
      - name: Restore state
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/cache/restore@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
          restore-keys: |
            insideredge-state-
      - name: Run pre-market scan
        if: steps.secrets.outputs.ready == 'true'
        env:
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EODHD_KEY: ${{ secrets.EODHD_KEY }}
        run: python bot_v17.py --mode premarket
      - name: Save state
        if: always() && steps.secrets.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
      - name: Alert on failure
        if: failure() && steps.secrets.outputs.ready == 'true'
        env:
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WF_NAME: ${{ github.workflow }}
          JOB_NAME: ${{ github.job }}
        shell: bash
        # Best-effort: don't fail the failure-handler itself (|| true).
        run: |
          payload=$(cat <<JSON
          {"embeds":[{"title":"🚨 ${WF_NAME} failed","color":15158332,"description":"Job **${JOB_NAME}** did not complete.\n\n[Open run logs](${RUN_URL})","footer":{"text":"GitHub Actions"}}]}
          JSON
          )
          curl -s -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_URL" || true
