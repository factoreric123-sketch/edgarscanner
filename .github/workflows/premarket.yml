# ── Pre-Market Scans ──────────────────────────────────────────────────────────
# Scan 1: 8:30 AM ET = 12:30 UTC — resume after 11PM silence, catch overnight
# Scan 2: 9:15 AM ET = 13:15 UTC — final queue check, posts to Discord before open
# In EST winter: 7:30 AM and 8:15 AM — still useful, catches early filers
name: Pre-Market

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 8:30 AM EDT
    - cron: '15 13 * * 1-5'   # 9:15 AM EDT
  workflow_dispatch:

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
          restore-keys: insideredge-state-
      - name: Run pre-market scan
        env:
          SEC_API_KEY:   ${{ secrets.SEC_API_KEY }}
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
        run: python bot_v17.py --mode premarket
      - name: Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
