# ── Market Hours Scanner ──────────────────────────────────────────────────────
name: Market Scan

on:
  schedule:
    - cron: '30,35,40,45,50,55 13 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 14 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 15 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 16 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 17 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 18 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 19 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - name: Validate secrets
        id: secrets
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=()
          for name in POLYGON_KEY DISCORD_URL SEC_USER_AGENT; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping market scan; missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.secrets.outputs.ready == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'
      - if: steps.secrets.outputs.ready == 'true'
        run: pip install requests
      - name: Restore state
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-v1
          restore-keys: insideredge-state-v1
      - name: Run scan
        if: steps.secrets.outputs.ready == 'true'
        env:
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python bot_v17.py --mode scan
      - name: Save state
        if: always() && steps.secrets.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-v1
