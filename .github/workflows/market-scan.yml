# ── Market Hours Scanner ──────────────────────────────────────────────────────
# Every 5 min, 9:30AM-4:00PM ET (Mon-Fri)
# Single UTC schedule — bot calls is_market_open() and handles DST correctly
# 9:30AM ET = 13:30 UTC (EDT) / 14:30 UTC (EST)
# 4:00PM ET = 20:00 UTC (EDT) / 21:00 UTC (EST)
# We cover 13:30-19:55 UTC — catches EDT window perfectly
# In EST (winter), market opens at 14:30 so bot exits early from 13:30-14:25 scans
name: Market Scan

on:
  schedule:
    - cron: '30,35,40,45,50,55 13 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 14 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 15 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 16 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 17 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 18 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 19 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-v1
          restore-keys: insideredge-state-v1
      - name: Run scan
        env:
          SEC_API_KEY:   ${{ secrets.SEC_API_KEY }}
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
        run: python bot_v17.py --mode scan
      - name: Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-v1
