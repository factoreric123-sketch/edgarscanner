name: Heartbeat

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM ET (market open check)
    - cron: '0 18 * * 1-5'   # 2:00 PM ET
    - cron: '0 22 * * 1-5'   # 6:00 PM ET (after close)
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Validate secrets
        id: secrets
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=()
          for name in POLYGON_KEY ALPACA_KEY ALPACA_SECRET DISCORD_URL; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping heartbeat; missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.secrets.outputs.ready == 'true'
        with:
          python-version: '3.11'
      - if: steps.secrets.outputs.ready == 'true'
        run: pip install requests
      - name: Restore state
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: bot_v15_state.json
          key: insideredge-state-${{ github.run_id }}
          restore-keys: insideredge-state-
      - name: Send heartbeat
        if: steps.secrets.outputs.ready == 'true'
        env:
          POLYGON_KEY:   ${{ secrets.POLYGON_KEY }}
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          DISCORD_URL:   ${{ secrets.DISCORD_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python bot_v17.py --mode heartbeat
